<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>사전예약 랜딩</title><link rel="stylesheet" href="../../assets/styles.css"></head><body><main class="app-shell"><a class="back" href="../../">← 포탈로 돌아가기</a><h1>MyFit - 사전 예약 오픈</h1><div class="panel"><p>AI 기반 맞춤 루틴 + 식단 관리 모바일 앱. 지금 사전등록하고 출시 알림을 받아보세요.</p><div class="row"><div class="panel"><h3>핵심 기능</h3><ul><li>개인화 운동 루틴 추천</li><li>식단 사진 기반 칼로리 분석</li><li>진행률 리포트 & 리마인더</li></ul></div><div class="panel"><h3>앱 스크린샷(예시)</h3><p>📱 대시보드 / 챌린지 / 주간 리포트</p></div></div><label>사전예약 이메일<input id="email" type="email" placeholder="you@example.com"></label><button id="reserve">사전예약 등록</button><p id="status" class="small"></p><p class="footer">출시 예정: 2026 Q2 · App Store / Google Play 동시 출시 예정</p></div></main><script>reserve.onclick=()=>{const v=email.value.trim();if(!v||!v.includes('@')){status.textContent='유효한 이메일을 입력해 주세요.';return;}const arr=JSON.parse(localStorage.getItem('prelaunch_list')||'[]');arr.push({email:v,at:new Date().toISOString()});localStorage.setItem('prelaunch_list',JSON.stringify(arr));status.textContent='등록되었습니다. 감사합니다!';email.value='';};</script></body></html>
