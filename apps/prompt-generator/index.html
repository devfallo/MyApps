<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 프롬프트 템플릿</title><link rel="stylesheet" href="../../assets/styles.css"></head><body><main class="app-shell"><a class="back" href="../../">← 포탈로 돌아가기</a><h1>AI 프롬프트 관리 템플릿</h1><div class="panel"><label>역할<input id="role" placeholder="예: 시니어 마케터"></label><label>목적<input id="goal" placeholder="예: 신규 제품 런칭 캠페인 제안"></label><label>형식<input id="format" placeholder="예: 표 + 실행 체크리스트"></label><button id="generate">프롬프트 생성</button><textarea id="output" rows="7" placeholder="생성 결과"></textarea><div class="row"><button id="copy">클립보드 복사</button><button id="save">LocalStorage 저장</button></div><p id="msg" class="small"></p></div></main><script>const $=id=>document.getElementById(id);const keys=['role','goal','format'];keys.forEach(k=>$(k).value=localStorage.getItem('pg_'+k)||'');$('generate').onclick=()=>{$('output').value=`당신은 ${$('role').value}입니다.\n목적: ${$('goal').value}\n출력 형식: ${$('format').value}\n제약: 단계별로 명확하게 작성하고 실행 가능한 항목으로 제시하세요.`};$('save').onclick=()=>{keys.forEach(k=>localStorage.setItem('pg_'+k,$(k).value));localStorage.setItem('pg_output',$('output').value);$('msg').textContent='저장되었습니다.'};$('copy').onclick=async()=>{try{await navigator.clipboard.writeText($('output').value);$('msg').textContent='복사 완료!';}catch{ $('msg').textContent='복사 실패(브라우저 권한 확인)'; }};$('output').value=localStorage.getItem('pg_output')||'';</script></body></html>
