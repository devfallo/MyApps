<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>액션캠 저장 용량 계산기</title><link rel="stylesheet" href="../../assets/styles.css"></head><body><main class="app-shell"><a class="back" href="../../">← 포탈로 돌아가기</a><h1>액션캠 설정 및 저장 용량 계산기</h1><div class="panel"><div class="row"><label>해상도<select id="res"><option>1080p</option><option>2.7K</option><option selected>4K</option></select></label><label>FPS<select id="fps"><option>30</option><option selected>60</option><option>120</option></select></label><label>SD 카드 용량(GB)<input id="gb" type="number" value="128"></label></div><label>비트레이트(Mbps)<input id="mbps" type="number" value="100"></label><button id="calc">녹화 시간 계산</button><div id="result" class="panel"></div><p class="small">추천: 여행 브이로그 = Wide FOV + 체스트 마운트 / 라이딩 = SuperView + 헬멧 마운트</p></div></main><script>const calc=()=>{const gb=+gbEl.value,mbps=+mbpsEl.value;const seconds=(gb*8*1024)/mbps;const h=Math.floor(seconds/3600),m=Math.floor((seconds%3600)/60);result.innerHTML=`예상 녹화 시간: <b>${h}시간 ${m}분</b><br>설정: ${res.value} ${fps.value}fps, ${mbps}Mbps`;};const gbEl=document.getElementById('gb'),mbpsEl=document.getElementById('mbps'),res=document.getElementById('res'),fps=document.getElementById('fps'),result=document.getElementById('result');document.getElementById('calc').onclick=calc;calc();</script></body></html>
