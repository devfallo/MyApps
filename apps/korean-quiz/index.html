<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>한국어 의성어/의태어 퀴즈</title><link rel="stylesheet" href="../../assets/styles.css"></head><body><main class="app-shell"><a class="back" href="../../">← 포탈로 돌아가기</a><h1>한국어 의성어·의태어 퀴즈 플래시카드</h1><div class="panel flashcard"><div class="flash-inner" id="card"></div><div class="row"><button id="flip">정답 보기</button><button id="next">다음 문제</button></div><p class="small" id="progress"></p></div></main><script>const cards=[{q:'비가 아주 세차게 내리는 소리',a:'주룩주룩 / 쏴아'},{q:'심장이 빨리 뛰는 상태',a:'두근두근'},{q:'작은 것이 반짝이며 빛나는 모양',a:'반짝반짝'},{q:'배가 매우 고픈 상태',a:'꼬르륵'}];let i=0,show=false;const render=()=>{card.innerHTML=`<h3>${show?'정답':'문제'}</h3><p>${show?cards[i].a:cards[i].q}</p>`;progress.textContent=`${i+1} / ${cards.length}`};flip.onclick=()=>{show=!show;render()};next.onclick=()=>{i=(i+1)%cards.length;show=false;render()};render();</script></body></html>
