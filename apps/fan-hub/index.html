<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fan Hub</title><link rel="stylesheet" href="../../assets/styles.css"></head><body><main class="app-shell"><a class="back" href="../../">← 포탈로 돌아가기</a><h1>아티스트 타임라인 & 세계관 위키</h1><div class="panel"><label>연도 필터<select id="year"><option value="all">전체</option><option>2021</option><option>2022</option><option>2023</option><option>2024</option></select></label><div id="timeline"></div></div><div class="panel"><h3>세계관 노드</h3><ul><li>🌙 Moon City: 기억을 저장하는 도시</li><li>🗝️ Key of Echo: 회귀를 여는 열쇠</li><li>🕰️ Loop Stage: 시간 반복이 발생하는 무대</li></ul></div></main><script>const data=[['2021','데뷔 싱글 발표'],['2022','세계관 챕터1 MV 공개'],['2023','월드투어 시작'],['2024','챕터2 앨범 발매']];const render=()=>{const y=year.value;timeline.innerHTML=data.filter(d=>y==='all'||d[0]===y).map(d=>`<div class='timeline-item'><b>${d[0]}</b> - ${d[1]}</div>`).join('')||'데이터 없음';};year.onchange=render;render();</script></body></html>
